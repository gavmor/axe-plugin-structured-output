name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build plugin wasm
        run: GOOS=wasip1 GOARCH=wasm go build -buildmode=c-shared -o structured-output.wasm ./cmd/structured-output
        env:
          GOPRIVATE: github.com/gavmor/*

      - name: Run tests
        run: go test -v -count=1 ./...
        env:
          GOPRIVATE: github.com/gavmor/*

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: structured-output-plugin
          path: structured-output.wasm
